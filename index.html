<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">[MÃ ĐƠN HÀNG]</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .invoice { width: 100%; margin: 0; padding: 5px; }
    .header {
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .info p { margin: 5px 0; font-size: 20px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 20px;
      border: 1px solid #000;
    }
    th, td {
      padding: 4px;
      border: 1px solid #000;
    }
    th { font-weight: bold; text-align: center; }
    
    #invoiceTable td:nth-child(1) { text-align: left; padding-left: 5px; }
    #invoiceTable td:not(:nth-child(1)) { 
      text-align: right; 
      padding-right: 5px; 
    }

    .button-container {
      margin: 10px;
      text-align: center;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #shareBtn { background-color: #673ab7; }
    #shareBtn:hover { background-color: #512da8; }
    #sharePdfBtn { background-color: #e91e63; }
    #sharePdfBtn:hover { background-color: #c2185b; }
  </style>
</head>
<body>
  <div class="invoice" id="invoiceContent">
    <div class="header">HOÁ ĐƠN</div>
    <div class="info">
      <p id="tenKhach">Khách hàng: [KHÁCH HÀNG]</p>
      <p id="ngayBan">Ngày bán: [Ngày bán]</p>
      <p id="ghiChu">Ghi chú: [GHI CHÚ]</p>
    </div>
    <table id="invoiceTable">
      <tr>
        <th>SẢN PHẨM</th>
        <th>SL</th>
        <th id="ckHeader">CK</th>
        <th>Đ.GIÁ</th>
        <th>T.TIỀN</th>
      </tr>
    </table>
  </div>

  <div class="button-container">
    <button id="shareBtn">Chia sẻ</button>
    <button id="sharePdfBtn">Chia sẻ PDF</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    
    const maDonHang = urlParams.get('madonhang') || '[MÃ ĐƠN HÀNG]';
    const tenKhach = urlParams.get('khachhang') || '';
    const donCuCon = urlParams.get('doncucon') || '0';
    const khachTra = urlParams.get('khachtra') || '0';
    const tongCong = urlParams.get('tongcong') || '0';
    const sauCK = urlParams.get('sauck') || '0';
    const ngayBan = urlParams.get('ngayban') || '[Ngày bán]';
    const ghiChu = urlParams.get('ghichu') || '';
    const data = urlParams.get('data') || '';

    // Set tiêu đề
    document.getElementById('pageTitle').textContent = decodeURIComponent(maDonHang);

    // Khách hàng
    const tenKhachValue = decodeURIComponent(tenKhach).trim();
    if (tenKhachValue) {
      document.getElementById('tenKhach').textContent = `Khách hàng: ${tenKhachValue}`;
    } else {
      document.getElementById('tenKhach').style.display = 'none';
    }

    document.getElementById('ngayBan').textContent = `Ngày bán: ${decodeURIComponent(ngayBan)}`;

    // Ghi chú
    const ghiChuValue = decodeURIComponent(ghiChu).trim();
    if (ghiChuValue) {
      document.getElementById('ghiChu').textContent = `Ghi chú: ${ghiChuValue}`;
    } else {
      document.getElementById('ghiChu').style.display = 'none';
    }

    // Xử lý dữ liệu chi tiết
    if (data) {
      const rows = decodeURIComponent(data).split('_b_');
      const table = document.getElementById('invoiceTable');
      let tongGia = 0;
      let hasAnyCK = false;

      rows.forEach(record => {
        if (!record.trim()) return;
        
        const items = record.split('_a_');
        if (items.length < 5) return;

        const sanPham = items[0].replace(/_/g, ',');
        const soLuong = items[1];
        const ck = items[2] || '0';
        const donGia = parseInt(items[3].replace(/,/g, '')) || 0;
        const thanhTien = parseInt(items[4].replace(/,/g, '')) || 0;

        if (parseFloat(ck) > 0) hasAnyCK = true;

        const row = table.insertRow();
        row.insertCell(0).textContent = sanPham;
        row.insertCell(1).textContent = soLuong;
        
        const ckCell = row.insertCell(2);
        ckCell.textContent = ck;
        
        row.insertCell(3).textContent = donGia.toLocaleString();
        row.insertCell(4).textContent = thanhTien.toLocaleString();

        tongGia += thanhTien;
      });

      // Ẩn cột CK nếu không có CK nào
      const ckHeader = document.getElementById('ckHeader');
      ckHeader.style.display = hasAnyCK ? 'table-cell' : 'none';

      if (!hasAnyCK) {
        const allCKCells = table.querySelectorAll('tr td:nth-child(3)');
        allCKCells.forEach(cell => cell.style.display = 'none');
      }

      // Dòng Tổng tiền hàng
      const totalRow = table.insertRow();
      totalRow.insertCell(0).outerHTML = `<td colspan="1" style="font-weight:bold; text-align:right; padding-left:5px;">Tổng tiền hàng:</td>`;
      const totalValueCell = totalRow.insertCell(1);
      totalValueCell.colSpan = hasAnyCK ? 4 : 3;
      totalValueCell.style.fontWeight = 'bold';
      totalValueCell.style.textAlign = 'right';
      totalValueCell.style.paddingRight = '5px';
      totalValueCell.textContent = `${tongGia.toLocaleString()} VNĐ`;

      // Dòng Sau CK (chỉ hiện nếu có CK)
      const sauCKValue = parseInt(decodeURIComponent(sauCK).replace(/,/g,'')) || 0;
      if (hasAnyCK && sauCKValue > 0) {
        const sauRow = table.insertRow();
        sauRow.insertCell(0).outerHTML = `<td colspan="1" style="font-weight:bold; text-align:right; padding-left:5px;">Sau CK:</td>`;
        const sauValueCell = sauRow.insertCell(1);
        sauValueCell.colSpan = hasAnyCK ? 4 : 3;
        sauValueCell.style.fontWeight = 'bold';
        sauValueCell.style.textAlign = 'right';
        sauValueCell.style.paddingRight = '5px';
        sauValueCell.textContent = `${sauCKValue.toLocaleString()} VNĐ`;
      }

      // Đơn cũ còn, Khách trả, Tổng cộng còn
      const donCuConValue = parseInt(decodeURIComponent(donCuCon).replace(/,/g,'')) || 0;
      const khachTraValue = parseInt(decodeURIComponent(khachTra).replace(/,/g,'')) || 0;
      const tongCongValue = parseInt(decodeURIComponent(tongCong).replace(/,/g,'')) || 0;

      const colSpanValue = hasAnyCK ? 4 : 3;

      if (donCuConValue !== 0) {
        const row = table.insertRow();
        row.insertCell(0).outerHTML = `<td colspan="1" style="font-weight:bold; text-align:right; padding-left:5px;">Đơn cũ còn:</td>`;
        const cell = row.insertCell(1);
        cell.colSpan = colSpanValue;
        cell.style.fontWeight = 'bold';
        cell.style.textAlign = 'right';
        cell.style.paddingRight = '5px';
        cell.textContent = `${donCuConValue.toLocaleString()} VNĐ`;
      }

      if (khachTraValue !== 0) {
        const row = table.insertRow();
        row.insertCell(0).outerHTML = `<td colspan="1" style="font-weight:bold; text-align:right; padding-left:5px;">Khách trả:</td>`;
        const cell = row.insertCell(1);
        cell.colSpan = colSpanValue;
        cell.style.fontWeight = 'bold';
        cell.style.textAlign = 'right';
        cell.style.paddingRight = '5px';
        cell.textContent = `${khachTraValue.toLocaleString()} VNĐ`;
      }

      if (donCuConValue !== 0 || khachTraValue !== 0) {
        const row = table.insertRow();
        row.insertCell(0).outerHTML = `<td colspan="1" style="font-weight:bold; text-align:right; padding-left:5px;">Tổng cộng còn:</td>`;
        const cell = row.insertCell(1);
        cell.colSpan = colSpanValue;
        cell.style.fontWeight = 'bold';
        cell.style.textAlign = 'right';
        cell.style.paddingRight = '5px';
        cell.textContent = `${tongCongValue.toLocaleString()} VNĐ`;
      }
    }

    // Share functions
    async function captureInvoice() {
      return await html2canvas(document.getElementById("invoiceContent"), { scale: 3, useCORS: true });
    }

    async function shareInvoice() {
      try {
        const canvas = await captureInvoice();
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const file = new File([blob], `hoa_don_${maDonHang}.png`, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
        }
      } catch (e) {}
    }

    async function shareInvoiceAsPdf() {
      try {
        const canvas = await captureInvoice();
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const imgWidth = 190;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        const pdf = new jsPDF({ 
          orientation: 'portrait', 
          unit: 'mm', 
          format: [210, Math.max(imgHeight + 20, 297)] 
        });
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        const pdfBlob = pdf.output('blob');
        const pdfFile = new File([pdfBlob], `hoa_don_${maDonHang}.pdf`, { type: 'application/pdf' });
        if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
          await navigator.share({ files: [pdfFile] });
        }
      } catch (e) {}
    }

    document.getElementById("shareBtn").addEventListener("click", shareInvoice);
    document.getElementById("sharePdfBtn").addEventListener("click", shareInvoiceAsPdf);
  </script>
</body>
</html>
