<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">[MÃ ĐƠN HÀNG]</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .invoice { width: 100%; margin: 0; padding: 5px; }
    .header { 
      text-align: center; 
      font-size: 32px; 
      font-weight: bold; 
      margin-bottom: 10px; 
    }
    .info p { margin: 5px 0; font-size: 20px; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
      font-size: 20px;
      border: 1px solid #000;
    }
    th, td {
      padding: 6px 4px;
      border: 1px solid #000;
    }
    th { font-weight: bold; text-align: center; background-color: #f0f0f0; }

    #invoiceTable td:nth-child(1) { text-align: left; padding-left: 6px; }
    #invoiceTable td:not(:nth-child(1)) { text-align: right; padding-right: 8px; }

    /* Phần tổng kết - làm nổi bật và dễ nhìn hơn */
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 21px;
    }
    .summary-table td {
      padding: 8px 6px;
      border: 1px solid #000;
    }
    .summary-label {
      font-weight: bold;
      text-align: right;
      padding-right: 15px;
      width: 45%;
    }
    .summary-value {
      font-weight: bold;
      text-align: right;
      padding-right: 10px;
    }
    .total-line {
      background-color: #e6f0ff;
      font-size: 22px;
    }

    .button-container { 
      margin: 15px; 
      text-align: center; 
    }
    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 5px;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #shareBtn { background-color: #673ab7; }
    #shareBtn:hover { background-color: #512da8; }
    #sharePdfBtn { background-color: #e91e63; }
    #sharePdfBtn:hover { background-color: #c2185b; }
  </style>
</head>
<body>
  <div class="invoice" id="invoiceContent">
    <div class="header">HOÁ ĐƠN</div>
    <div class="info">
      <p id="tenKhach">Khách hàng: [KHÁCH HÀNG]</p>
      <p id="ngayBan">Ngày bán: [Ngày bán]</p>
      <p id="ghiChu">Ghi chú: [GHI CHÚ]</p>
    </div>

    <!-- Bảng chi tiết sản phẩm -->
    <table id="invoiceTable">
      <tr>
        <th>SẢN PHẨM</th>
        <th>SL</th>
        <th>Đ.GIÁ</th>
        <th id="ckHeader">CK</th>
        <th>T.TIỀN</th>
      </tr>
    </table>

    <!-- Phần tổng kết - dễ nhìn hơn -->
    <table class="summary-table" id="summaryTable">
      <!-- Nội dung sẽ được JS thêm vào -->
    </table>
  </div>

  <div class="button-container">
    <button id="shareBtn">Chia sẻ</button>
    <button id="sharePdfBtn">Chia sẻ PDF</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
   
    const maDonHang = urlParams.get('madonhang') || '[MÃ ĐƠN HÀNG]';
    const tenKhach = urlParams.get('khachhang') || '';
    const donCuCon = urlParams.get('doncucon') || '0';
    const khachTra = urlParams.get('khachtra') || '0';
    const tongCong = urlParams.get('tongcong') || '0';
    const sauCK = urlParams.get('sauck') || '0';
    const ngayBan = urlParams.get('ngayban') || '[Ngày bán]';
    const ghiChu = urlParams.get('ghichu') || '';
    const data = urlParams.get('data') || '';

    document.getElementById('pageTitle').textContent = decodeURIComponent(maDonHang);

    if (tenKhach) document.getElementById('tenKhach').textContent = `Khách hàng: ${decodeURIComponent(tenKhach)}`;
    else document.getElementById('tenKhach').style.display = 'none';

    document.getElementById('ngayBan').textContent = `Ngày bán: ${decodeURIComponent(ngayBan)}`;

    const ghiChuValue = decodeURIComponent(ghiChu).trim();
    if (ghiChuValue) document.getElementById('ghiChu').textContent = `Ghi chú: ${ghiChuValue}`;
    else document.getElementById('ghiChu').style.display = 'none';

    const detailTable = document.getElementById('invoiceTable');
    const summaryTable = document.getElementById('summaryTable');
    let tongGia = 0;
    let hasAnyCK = false;
    let hasProduct = false;

    // Xử lý chi tiết sản phẩm
    if (data && data.trim() !== '') {
      const rowsData = decodeURIComponent(data).split('_b_');
      let detailRows = [];

      rowsData.forEach(record => {
        if (!record.trim()) return;
        const items = record.split('_a_');
        if (items.length < 4) return;

        const sanPham = items[0].replace(/_/g, ',').trim();
        const soLuong = items[1];

        let donGia, thanhTien, ckRaw = '0';

        if (items.length >= 5) {
          ckRaw = items[2] || '0';
          donGia = parseInt(items[3].replace(/,/g, '')) || 0;
          thanhTien = parseInt(items[4].replace(/,/g, '')) || 0;
        } else {
          donGia = parseInt(items[2].replace(/,/g, '')) || 0;
          thanhTien = parseInt(items[3].replace(/,/g, '')) || 0;
        }

        const ckPercent = parseFloat(ckRaw) * 100 || 0;
        if (ckPercent > 0) hasAnyCK = true;

        detailRows.push({ sanPham, soLuong, donGia, ckPercent, thanhTien });
        tongGia += thanhTien;
        hasProduct = true;
      });

      detailRows.sort((a, b) => a.sanPham.localeCompare(b.sanPham, 'vi'));

      detailRows.forEach(item => {
        const row = detailTable.insertRow();
        row.insertCell(0).textContent = item.sanPham;
        row.insertCell(1).textContent = item.soLuong;
        row.insertCell(2).textContent = item.donGia.toLocaleString();
        const ckCell = row.insertCell(3);
        ckCell.textContent = (item.ckPercent > 0) ? item.ckPercent.toFixed(0) + '%' : '';
        row.insertCell(4).textContent = item.thanhTien.toLocaleString();
      });
    }

    if (!hasAnyCK) {
      document.getElementById('ckHeader').style.display = 'none';
      const ckCells = detailTable.querySelectorAll('td:nth-child(4)');
      ckCells.forEach(cell => cell.style.display = 'none');
    }

    // ==================== PHẦN TỔNG KẾT - DỄ NHÌN HƠN ====================
    let summaryHTML = '';

    if (hasProduct && tongGia > 0) {
      summaryHTML += `
        <tr>
          <td class="summary-label">Tổng tiền hàng:</td>
          <td class="summary-value">${tongGia.toLocaleString()} VNĐ</td>
        </tr>`;
    }

    const sauCKValue = parseInt(decodeURIComponent(sauCK).replace(/,/g, '')) || 0;
    if (hasAnyCK && sauCKValue > 0) {
      summaryHTML += `
        <tr>
          <td class="summary-label">Sau CK:</td>
          <td class="summary-value">${sauCKValue.toLocaleString()} VNĐ</td>
        </tr>`;
    }

    const donCuConValue = parseInt(decodeURIComponent(donCuCon).replace(/,/g,'')) || 0;
    if (donCuConValue !== 0) {
      summaryHTML += `
        <tr>
          <td class="summary-label">Đơn cũ còn:</td>
          <td class="summary-value">${donCuConValue.toLocaleString()} VNĐ</td>
        </tr>`;
    }

    const khachTraValue = parseInt(decodeURIComponent(khachTra).replace(/,/g,'')) || 0;
    if (khachTraValue !== 0) {
      summaryHTML += `
        <tr>
          <td class="summary-label">Khách trả:</td>
          <td class="summary-value">${khachTraValue.toLocaleString()} VNĐ</td>
        </tr>`;
    }

    const tongCongValue = parseInt(decodeURIComponent(tongCong).replace(/,/g,'')) || 0;
    if (tongCongValue !== 0 || donCuConValue !== 0 || khachTraValue !== 0) {
      summaryHTML += `
        <tr class="total-line">
          <td class="summary-label">Tổng cộng còn:</td>
          <td class="summary-value">${tongCongValue.toLocaleString()} VNĐ</td>
        </tr>`;
    }

    if (summaryHTML) {
      summaryTable.innerHTML = summaryHTML;
    }

    // Share functions giữ nguyên
    async function captureInvoice() {
      return await html2canvas(document.getElementById("invoiceContent"), { scale: 3, useCORS: true });
    }

    async function shareInvoice() {
      try {
        const canvas = await captureInvoice();
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const file = new File([blob], `hoa_don_${maDonHang}.png`, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) await navigator.share({ files: [file] });
      } catch (e) {}
    }

    async function shareInvoiceAsPdf() {
      try {
        const canvas = await captureInvoice();
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const imgWidth = 190;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [210, Math.max(imgHeight + 20, 297)] });
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        const pdfBlob = pdf.output('blob');
        const pdfFile = new File([pdfBlob], `hoa_don_${maDonHang}.pdf`, { type: 'application/pdf' });
        if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) await navigator.share({ files: [pdfFile] });
      } catch (e) {}
    }

    document.getElementById("shareBtn").addEventListener("click", shareInvoice);
    document.getElementById("sharePdfBtn").addEventListener("click", shareInvoiceAsPdf);
  </script>
</body>
</html>
