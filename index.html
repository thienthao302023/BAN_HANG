<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title id="pageTitle">[MÃ ĐƠN HÀNG]</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f8f8f8; }
    .invoice { width: 100%; max-width: 800px; margin: 0 auto; padding: 10px; background: white; }
    .header { text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 15px; }
    .info p { margin: 6px 0; font-size: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 20px; border: 1px solid #000; }
    th, td { padding: 6px 4px; border: 1px solid #000; }
    th { background: #f0f0f0; font-weight: bold; text-align: center; }

    .button-container {
      margin: 20px 10px;
      text-align: center;
      padding: 15px 0;
      background: white;
      position: sticky;
      bottom: 0;
      z-index: 100;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.15);
    }
    button {
      font-size: 21px;
      padding: 16px 30px;
      margin: 10px 8px;
      color: white;
      border: none;
      border-radius: 10px;
      min-height: 62px;
      width: 90%;
      max-width: 320px;
      touch-action: manipulation;
    }
    #shareBtn { background-color: #673ab7; }
    #sharePdfBtn { background-color: #e91e63; }
  </style>
</head>
<body>
  <div class="invoice" id="invoiceContent">
    <div class="header">HOÁ ĐƠN</div>
    <div class="info">
      <p id="tenKhach">Khách hàng: [KHÁCH HÀNG]</p>
      <p id="ngayBan">Ngày bán: [Ngày bán]</p>
      <p id="ghiChu">Ghi chú: [GHI CHÚ]</p>
    </div>
    <table id="invoiceTable">
      <tr>
        <th>SẢN PHẨM</th>
        <th>SL</th>
        <th>Đ.GIÁ</th>
        <th id="ckHeader">CK</th>
        <th>T.TIỀN</th>
      </tr>
    </table>
  </div>

  <div class="button-container">
    <button id="shareBtn">📤 Chia sẻ Ảnh</button>
    <button id="sharePdfBtn">📄 Chia sẻ PDF</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const maDonHang = urlParams.get('madonhang') || 'HOADON';

    document.getElementById('pageTitle').textContent = decodeURIComponent(maDonHang);

    // Điền thông tin
    const tenKhachValue = decodeURIComponent(urlParams.get('khachhang') || '').trim();
    if (tenKhachValue) document.getElementById('tenKhach').textContent = `Khách hàng: ${tenKhachValue}`;
    else document.getElementById('tenKhach').style.display = 'none';

    document.getElementById('ngayBan').textContent = `Ngày bán: ${decodeURIComponent(urlParams.get('ngayban') || '[Ngày bán]')}`;

    const ghiChuValue = decodeURIComponent(urlParams.get('ghichu') || '').trim();
    if (ghiChuValue) document.getElementById('ghiChu').textContent = `Ghi chú: ${ghiChuValue}`;
    else document.getElementById('ghiChu').style.display = 'none';

    // Xử lý bảng (logic cũ của bạn)
    const table = document.getElementById('invoiceTable');
    let tongGia = 0;
    let hasAnyCK = false;
    const data = urlParams.get('data') || '';

    if (data) {
      const rowsData = decodeURIComponent(data).split('_b_');
      let detailRows = [];

      rowsData.forEach(record => {
        if (!record.trim()) return;
        const items = record.split('_a_');
        if (items.length < 4) return;

        const sanPham = items[0].replace(/_/g, ',').trim();
        const soLuong = items[1];
        let donGia, thanhTien, ckRaw = '0';

        if (items.length >= 5) {
          ckRaw = items[2] || '0';
          donGia = parseInt(items[3].replace(/,/g, '')) || 0;
          thanhTien = parseInt(items[4].replace(/,/g, '')) || 0;
        } else {
          donGia = parseInt(items[2].replace(/,/g, '')) || 0;
          thanhTien = parseInt(items[3].replace(/,/g, '')) || 0;
        }

        const ckPercent = parseFloat(ckRaw) * 100 || 0;
        if (ckPercent > 0) hasAnyCK = true;

        detailRows.push({ sanPham, soLuong, donGia, ckPercent, thanhTien });
        tongGia += thanhTien;
      });

      detailRows.sort((a, b) => a.sanPham.localeCompare(b.sanPham, 'vi'));
      detailRows.forEach(item => {
        const row = table.insertRow();
        row.insertCell(0).textContent = item.sanPham;
        row.insertCell(1).textContent = item.soLuong;
        row.insertCell(2).textContent = item.donGia.toLocaleString();
        const ckCell = row.insertCell(3);
        ckCell.textContent = (item.ckPercent > 0) ? item.ckPercent.toFixed(0) + '%' : '';
        row.insertCell(4).textContent = item.thanhTien.toLocaleString();
      });
    }

    if (!hasAnyCK) {
      document.getElementById('ckHeader').style.display = 'none';
      table.querySelectorAll('td:nth-child(4)').forEach(cell => cell.style.display = 'none');
    }

    // ====================== HÀM CHIA SẺ ƯU TIÊN ======================
    async function captureInvoice() {
      return await html2canvas(document.getElementById("invoiceContent"), { 
        scale: 3, 
        backgroundColor: "#ffffff" 
      });
    }

    async function tryShare(blob, filename, title) {
      try {
        const file = new File([blob], filename, { 
          type: filename.endsWith('.pdf') ? 'application/pdf' : 'image/png' 
        });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: title,
            text: `Hoá đơn ${maDonHang}`
          });
          return true;
        }
        return false;
      } catch (e) {
        console.log("Share failed:", e);
        return false;
      }
    }

    // Button Chia sẻ Ảnh
    document.getElementById("shareBtn").addEventListener("click", async () => {
      try {
        const canvas = await captureInvoice();
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));

        const shared = await tryShare(blob, `HoaDon_${maDonHang}.png`, "Hoá đơn");
        
        if (!shared) {
          // Fallback tải về
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `HoaDon_${maDonHang}.png`;
          a.click();
          URL.revokeObjectURL(url);
          alert("✅ Đã tải ảnh về (không share được)");
        }
      } catch (e) {
        alert("Lỗi: " + e.message);
      }
    });

    // Button Chia sẻ PDF
    document.getElementById("sharePdfBtn").addEventListener("click", async () => {
      try {
        const canvas = await captureInvoice();
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 190;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);

        const pdfBlob = pdf.output('blob');
        const shared = await tryShare(pdfBlob, `HoaDon_${maDonHang}.pdf`, "Hoá đơn PDF");

        if (!shared) {
          const url = URL.createObjectURL(pdfBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `HoaDon_${maDonHang}.pdf`;
          a.click();
          URL.revokeObjectURL(url);
          alert("✅ Đã tải PDF về (không share được)");
        }
      } catch (e) {
        alert("Lỗi PDF: " + e.message);
      }
    });
  </script>
</body>
</html>
